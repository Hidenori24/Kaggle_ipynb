name: pokemon-tcg-ai-battle CI

on:
  push:
    paths:
      - "pokemon-tcg-ai-battle/**"
      - ".github/workflows/pokemon-tcg-ci.yml"
  pull_request:
    paths:
      - "pokemon-tcg-ai-battle/**"

# Cancel a still-running run for the same branch/PR when a new commit lands,
# so pushing twice in a row doesn't burn double the CI minutes on stale code.
concurrency:
  group: pokemon-tcg-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokemon-tcg-ai-battle
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pokemon-tcg-ai-battle/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests against the real engine
        run: python -m pytest tests/ -v

      - name: Measure win rate vs baselines
        run: |
          python tools/evaluate.py --games 20 --opponent random
          python tools/evaluate.py --games 20 --opponent first

  notebooks:
    # Separate job (not blocking on `test`) so a broken notebook doesn't mask
    # a passing test suite in the same run, and vice versa -- notebooks/ is
    # documentation/analysis, not the submission itself.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokemon-tcg-ai-battle
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pokemon-tcg-ai-battle/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Japanese font used by notebook plot labels
        run: sudo apt-get update && sudo apt-get install -y fonts-ipafont-gothic

      - name: Verify notebooks still execute end-to-end
        run: |
          cd notebooks
          jupyter nbconvert --to notebook --execute --output-dir /tmp --output 01_check 01_card_pool_eda.ipynb
          jupyter nbconvert --to notebook --execute --output-dir /tmp --output 02_check 02_agent_evaluation.ipynb
