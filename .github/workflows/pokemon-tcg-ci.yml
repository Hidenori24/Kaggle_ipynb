name: pokemon-tcg-ai-battle CI

on:
  push:
    paths:
      - "pokemon-tcg-ai-battle/**"
      - ".github/workflows/pokemon-tcg-ci.yml"
  pull_request:
    paths:
      - "pokemon-tcg-ai-battle/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokemon-tcg-ai-battle
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests against the real engine
        run: python -m pytest tests/ -v

      - name: Measure win rate vs baselines
        run: |
          python tools/evaluate.py --games 20 --opponent random
          python tools/evaluate.py --games 20 --opponent first
